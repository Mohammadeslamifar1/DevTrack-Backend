version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: devtrack
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://dev:devpass@db:5432/devtrack
      - DJANGO_SETTINGS_MODULE=devtrack.settings
    depends_on:
      - db

volumes:
  postgres_data:
